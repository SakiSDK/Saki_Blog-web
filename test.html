<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
<svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 文字动画（同之前） -->
    <animate id="fadeInL" attributeName="opacity" from="0" to="1" dur="0.5s" begin="0s" fill="freeze" />
    <animate id="fadeInO" attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze" />
    <animate id="fadeInA" attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.4s" fill="freeze" />
    <animate id="fadeInD" attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.6s" fill="freeze" />
    <animate id="fadeInI" attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze" />
    <animate id="fadeInN" attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze" />
    <animate id="fadeInG" attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze" />
    <animate id="breathe" attributeName="opacity" from="1" to="0.6" dur="1.5s" begin="2s; breathe.end+0.5s" fill="freeze" />
    <animate id="breatheBack" attributeName="opacity" from="0.6" to="1" dur="1.5s" begin="breathe.end" fill="freeze" />

    <!-- 下划线动画：从左到右绘制 + 呼吸 -->
    <animate id="lineDraw" attributeName="stroke-dashoffset" from="240" to="0" dur="1.5s" begin="1.5s" fill="freeze" />
    <animate id="lineBreathe" attributeName="opacity" from="1" to="0.4" dur="1.5s" begin="3s; lineBreathe.end+0.5s" fill="freeze" />
    <animate id="lineBreatheBack" attributeName="opacity" from="0.4" to="1" dur="1.5s" begin="lineBreathe.end" fill="freeze" />
  </defs>

  <!-- LOADING 字样 -->
  <text x="0" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#42b983" opacity="0">L<animate xlink:href="#fadeInL" /><animate xlink:href="#breathe" /><animate xlink:href="#breatheBack" /></text>
  <text x="35" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#42b983" opacity="0">O<animate xlink:href="#fadeInO" /><animate xlink:href="#breathe" /><animate xlink:href="#breatheBack" /></text>
  <text x="70" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#42b983" opacity="0">A<animate xlink:href="#fadeInA" /><animate xlink:href="#breathe" /><animate xlink:href="#breatheBack" /></text>
  <text x="105" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#42b983" opacity="0">D<animate xlink:href="#fadeInD" /><animate xlink:href="#breathe" /><animate xlink:href="#breatheBack" /></text>
  <text x="140" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#42b983" opacity="0">I<animate xlink:href="#fadeInI" /><animate xlink:href="#breathe" /><animate xlink:href="#breatheBack" /></text>
  <text x="165" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#42b983" opacity="0">N<animate xlink:href="#fadeInN" /><animate xlink:href="#breathe" /><animate xlink:href="#breatheBack" /></text>
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#42b983" opacity="0">G<animate xlink:href="#fadeInG" /><animate xlink:href="#breathe" /><animate xlink:href="#breatheBack" /></text>

  <!-- 下划线（动态绘制） -->
  <line x1="0" y1="55" x2="240" y2="55" stroke="#42b983" stroke-width="4" stroke-linecap="round" 
        stroke-dasharray="240" stroke-dashoffset="240" opacity="0.8">
    <animate xlink:href="#lineDraw" />
    <animate xlink:href="#lineBreathe" />
    <animate xlink:href="#lineBreatheBack" />
  </line>
</svg>
</body>
</html>
